apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: quoteservice-role
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: quoteservice-rolebinding
subjects:
  - kind: ServiceAccount
    name: default
roleRef:
  kind: Role
  name: quoteservice-role
  apiGroup: rbac.authorization.k8s.io
